<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票报告追踪</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #21253a;
    --border: #2e3347;
    --text: #e2e8f0;
    --sub: #8892a4;
    --accent: #4f8ef7;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; }

  /* Layout */
  .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
  .topbar h1 { font-size: 18px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .topbar-actions { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 180px; max-width: 320px; }
  .search-wrap input { width: 100%; padding: 7px 12px; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 13px; outline: none; }
  .search-wrap input:focus { border-color: var(--accent); }
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* Buttons */
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: #7f1d1d; color: var(--red); border: 1px solid #991b1b; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .toggle-label { font-size: 13px; color: var(--sub); }
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: .2s; }
  .slider:before { content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider:before { transform: translateX(18px); }

  /* Report group */
  .report-group { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 24px; overflow: hidden; }
  .report-header { padding: 14px 20px; background: var(--card2); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .report-market { background: var(--accent); color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .report-date { font-size: 14px; font-weight: 600; }
  .report-source { font-size: 13px; color: var(--sub); }
  .report-header-actions { margin-left: auto; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 14px; text-align: left; color: var(--sub); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); background: var(--card); position: sticky; top: 0; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79,142,247,.04); }

  /* Stock name cell */
  .stock-name { font-size: 15px; font-weight: 700; }
  .stock-code { font-size: 11px; color: var(--sub); margin-top: 2px; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(52,211,153,.15); color: var(--green); }
  .badge-red { background: rgba(248,113,113,.15); color: var(--red); }
  .badge-yellow { background: rgba(251,191,36,.15); color: var(--yellow); }
  .badge-blue { background: rgba(79,142,247,.15); color: var(--accent); }
  .badge-gray { background: rgba(136,146,164,.15); color: var(--sub); }

  /* Channel arrow */
  .channel { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 12px; }
  .channel-arrow { color: var(--sub); }

  /* Sell signal row */
  .row-sell td { background: rgba(248,113,113,.04); }
  .sell-signal { display: inline-flex; align-items: center; gap: 4px; color: var(--red); font-size: 11px; font-weight: 700; }

  /* Collapsed sell summary */
  .sell-summary { padding: 10px 20px; font-size: 13px; color: var(--sub); cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .sell-summary:hover { color: var(--text); }
  .sell-count { background: rgba(248,113,113,.2); color: var(--red); padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; }

  /* Pct cells */
  .pct-up { color: var(--green); font-weight: 600; }
  .pct-down { color: var(--red); font-weight: 600; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-head h2 { font-size: 16px; }
  .modal-close { background: none; border: none; color: var(--sub); font-size: 20px; cursor: pointer; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 9px 12px; background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 140px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Alert */
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
  .alert-success { background: rgba(52,211,153,.12); color: var(--green); border: 1px solid rgba(52,211,153,.3); }
  .alert-error { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
  .alert-info { background: rgba(79,142,247,.12); color: var(--accent); border: 1px solid rgba(79,142,247,.3); }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--sub); font-size: 14px; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 10px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 80px 20px; color: var(--sub); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>📈 股票报告追踪</h1>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索股票名称或代码…" oninput="renderAll()">
  </div>
  <div class="topbar-actions">
    <div class="toggle-row" style="margin-bottom:0">
      <span class="toggle-label">显示卖出信号</span>
      <label class="toggle">
        <input type="checkbox" id="showSell" onchange="renderAll()">
        <span class="slider"></span>
      </label>
    </div>
    <button class="btn btn-secondary" onclick="openManualModal()">手动添加单只</button>
    <button class="btn btn-primary" onclick="openSubmitModal()">提交新报告</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><span class="spinner"></span>加载中…</div>
</div>

<!-- Submit Modal -->
<div class="modal-overlay hidden" id="submitModal">
  <div class="modal">
    <div class="modal-head">
      <h2>提交新报告</h2>
      <button class="modal-close" onclick="closeModal('submitModal')">×</button>
    </div>
    <div class="modal-body">
      <div id="submitAlert"></div>
      <div class="form-group">
        <label>粘贴报告文本</label>
        <textarea id="submitText" placeholder="粘贴原始报告文本，支持任意格式…"></textarea>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="submitPwd" placeholder="输入提交密码">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('submitModal')">取消</button>
      <button class="btn btn-primary" id="submitBtn" onclick="doSubmit()">AI 格式化并保存</button>
    </div>
  </div>
</div>

<!-- Manual Add Modal -->
<div class="modal-overlay hidden" id="manualModal">
  <div class="modal">
    <div class="modal-head">
      <h2>手动添加单只</h2>
      <button class="modal-close" onclick="closeModal('manualModal')">×</button>
    </div>
    <div class="modal-body">
      <div id="manualAlert"></div>
      <div class="form-row">
        <div class="form-group">
          <label>市场 *</label>
          <input id="m_market" placeholder="港A">
        </div>
        <div class="form-group">
          <label>日期 *</label>
          <input id="m_date" type="date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>来源</label>
          <input id="m_source" placeholder="利弗莫尔">
        </div>
        <div class="form-group">
          <label>中文名称 *</label>
          <input id="m_name" placeholder="兆易创新">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>交易所</label>
          <input id="m_exchange" placeholder="HK / SH / SZ">
        </div>
        <div class="form-group">
          <label>股票代码 *</label>
          <input id="m_code" placeholder="03986">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>上涨配置 %</label>
          <input id="m_up" type="number" step="0.1" placeholder="6.0">
        </div>
        <div class="form-group">
          <label>下跌配置 %</label>
          <input id="m_down" type="number" step="0.1" placeholder="6.0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>通道变化（从）</label>
          <input id="m_chfrom" placeholder="上涨趋势">
        </div>
        <div class="form-group">
          <label>通道变化（到）</label>
          <input id="m_chto" placeholder="自然回调">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>价格类型</label>
          <select id="m_ptype">
            <option value="">—</option>
            <option value="当前价格">当前价格</option>
            <option value="关键价格">关键价格</option>
          </select>
        </div>
        <div class="form-group">
          <label>价格</label>
          <input id="m_price" type="number" step="0.01" placeholder="738.5">
        </div>
      </div>
      <div class="form-group">
        <label>价格日期（关键价格用）</label>
        <input id="m_pdate" type="date">
      </div>
      <div class="form-group">
        <label>密码 *</label>
        <input type="password" id="m_pwd" placeholder="输入提交密码">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('manualModal')">取消</button>
      <button class="btn btn-primary" id="manualBtn" onclick="doManual()">保存</button>
    </div>
  </div>
</div>

<!-- Delete Password Modal -->
<div class="modal-overlay hidden" id="deleteModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-head">
      <h2>确认删除</h2>
      <button class="modal-close" onclick="closeModal('deleteModal')">×</button>
    </div>
    <div class="modal-body">
      <div id="deleteAlert"></div>
      <p style="font-size:13px;color:var(--sub);margin-bottom:14px" id="deleteDesc">确定要删除这条记录吗？此操作不可撤销。</p>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="deletePwd" placeholder="输入密码">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('deleteModal')">取消</button>
      <button class="btn btn-danger" id="deleteConfirmBtn" onclick="doDelete()">确认删除</button>
    </div>
  </div>
</div>

<script>
let allReports = [];
let pendingDelete = null; // { id, type }

// ── Data ──────────────────────────────────────────────────────────────────────

async function loadReports() {
  try {
    const r = await fetch('/api/reports');
    allReports = await r.json();
    renderAll();
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="alert alert-error">加载失败: ${e.message}</div>`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderAll() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const showSell = document.getElementById('showSell').checked;
  const main = document.getElementById('main');

  if (!allReports.length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>暂无报告，点击右上角"提交新报告"开始</p></div>`;
    return;
  }

  let html = '';

  for (const report of allReports) {
    const items = report.items || [];

    // Filter by search
    const filtered = query
      ? items.filter(i => i.name?.toLowerCase().includes(query) || i.code?.toLowerCase().includes(query))
      : items;

    if (query && filtered.length === 0) continue;

    const sellItems = filtered.filter(i => isSell(i));
    const normalItems = filtered.filter(i => !isSell(i));

    html += `
    <div class="report-group">
      <div class="report-header">
        <span class="report-market">${esc(report.market)}</span>
        <span class="report-date">${report.report_date}</span>
        <span class="report-source">${esc(report.source)}</span>
        <div class="report-header-actions">
          <button class="btn btn-danger btn-sm" onclick="confirmDelete(${report.id},'report','整个报告（含所有标的）')">删除报告</button>
        </div>
      </div>`;

    // Sell items section
    if (sellItems.length > 0) {
      if (showSell) {
        html += renderTable(sellItems, true);
      } else {
        const names = sellItems.map(i => i.name).join('、');
        html += `<div class="sell-summary" onclick="document.getElementById('showSell').checked=true;renderAll()">
          <span class="sell-count">卖出 ${sellItems.length}</span>
          <span>含下跌趋势标的：${esc(names)}（点击展开）</span>
        </div>`;
      }
    }

    // Normal items
    if (normalItems.length > 0) {
      html += renderTable(normalItems, false);
    }

    html += `</div>`;
  }

  if (!html) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>没有匹配"${esc(query)}"的结果</p></div>`;
  } else {
    main.innerHTML = html;
  }
}

function renderTable(items, isSellSection) {
  let rows = '';
  for (const item of items) {
    const sell = isSell(item);
    rows += `<tr class="${sell ? 'row-sell' : ''}">
      <td>
        <div class="stock-name">${esc(item.name)}${sell ? ' <span class="sell-signal">🔴 卖出</span>' : ''}</div>
        <div class="stock-code">${esc(item.exchange || '')}${item.exchange ? '.' : ''}${esc(item.code)}</div>
      </td>
      <td>
        <span class="pct-up">↑${item.up_pct ?? '—'}%</span>
        &nbsp;
        <span class="pct-down">↓${item.down_pct ?? '—'}%</span>
      </td>
      <td>
        <div class="channel">
          ${item.channel_from ? `<span class="badge ${channelBadge(item.channel_from)}">${esc(item.channel_from)}</span>` : ''}
          ${item.channel_from && item.channel_to ? '<span class="channel-arrow">→</span>' : ''}
          ${item.channel_to ? `<span class="badge ${channelBadge(item.channel_to)}">${esc(item.channel_to)}</span>` : '—'}
        </div>
      </td>
      <td>
        ${item.price != null ? `
          <div>${item.price_type === '关键价格' ? '<span class="badge badge-yellow">关键</span>' : '<span class="badge badge-blue">当前</span>'} ${item.price}</div>
          ${item.price_date ? `<div style="font-size:11px;color:var(--sub);margin-top:3px">${item.price_date}</div>` : ''}
        ` : '—'}
      </td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete(${item.id},'item','${esc(item.name)}(${esc(item.code)})')">删除</button>
      </td>
    </tr>`;
  }

  return `
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>标的</th>
        <th>配置</th>
        <th>通道变化</th>
        <th>价格</th>
        <th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`;
}

function isSell(item) {
  const t = (item.channel_to || '').toLowerCase();
  return t.includes('下跌趋势');
}

function channelBadge(state) {
  if (!state) return 'badge-gray';
  if (state.includes('上涨')) return 'badge-green';
  if (state.includes('下跌')) return 'badge-red';
  if (state.includes('回调')) return 'badge-yellow';
  return 'badge-gray';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modals ────────────────────────────────────────────────────────────────────

function openSubmitModal() {
  document.getElementById('submitText').value = '';
  document.getElementById('submitPwd').value = '';
  document.getElementById('submitAlert').innerHTML = '';
  showModal('submitModal');
}

function openManualModal() {
  // Set today's date as default
  document.getElementById('m_date').value = new Date().toISOString().slice(0,10);
  document.getElementById('manualAlert').innerHTML = '';
  showModal('manualModal');
}

function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ── Submit ────────────────────────────────────────────────────────────────────

async function doSubmit() {
  const text = document.getElementById('submitText').value.trim();
  const password = document.getElementById('submitPwd').value;
  const alertEl = document.getElementById('submitAlert');
  const btn = document.getElementById('submitBtn');

  if (!text) return showAlert(alertEl, 'error', '请粘贴报告文本');
  if (!password) return showAlert(alertEl, 'error', '请输入密码');

  btn.disabled = true;
  btn.textContent = '处理中…';
  showAlert(alertEl, 'info', '正在调用 AI 格式化，请稍候…');

  try {
    const r = await fetch('/api/reports', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, password })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.statusText);

    const mode = data.usedAI ? 'AI 格式化' : '本地解析（AI 不可用）';
    showAlert(alertEl, 'success',
      `✓ 保存成功（${mode}）：新增 ${data.inserted} 条，跳过 ${data.skipped} 条重复`);
    await loadReports();
    setTimeout(() => closeModal('submitModal'), 1800);
  } catch (e) {
    showAlert(alertEl, 'error', e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'AI 格式化并保存';
  }
}

// ── Manual ────────────────────────────────────────────────────────────────────

async function doManual() {
  const alertEl = document.getElementById('manualAlert');
  const btn = document.getElementById('manualBtn');

  const body = {
    market: document.getElementById('m_market').value.trim(),
    report_date: document.getElementById('m_date').value,
    source: document.getElementById('m_source').value.trim() || '手动',
    name: document.getElementById('m_name').value.trim(),
    exchange: document.getElementById('m_exchange').value.trim(),
    code: document.getElementById('m_code').value.trim(),
    up_pct: document.getElementById('m_up').value || null,
    down_pct: document.getElementById('m_down').value || null,
    channel_from: document.getElementById('m_chfrom').value.trim(),
    channel_to: document.getElementById('m_chto').value.trim(),
    price_type: document.getElementById('m_ptype').value || null,
    price: document.getElementById('m_price').value || null,
    price_date: document.getElementById('m_pdate').value || null,
    password: document.getElementById('m_pwd').value
  };

  if (!body.market || !body.report_date || !body.code || !body.name) {
    return showAlert(alertEl, 'error', '市场、日期、代码、名称为必填项');
  }
  if (!body.password) return showAlert(alertEl, 'error', '请输入密码');

  btn.disabled = true;
  btn.textContent = '保存中…';

  try {
    const r = await fetch('/api/items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.statusText);

    showAlert(alertEl, 'success', '✓ 添加成功');
    await loadReports();
    setTimeout(() => closeModal('manualModal'), 1200);
  } catch (e) {
    showAlert(alertEl, 'error', e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
}

// ── Delete ────────────────────────────────────────────────────────────────────

function confirmDelete(id, type, label) {
  pendingDelete = { id, type };
  document.getElementById('deleteDesc').textContent = `确定要删除「${label}」吗？此操作不可撤销。`;
  document.getElementById('deletePwd').value = '';
  document.getElementById('deleteAlert').innerHTML = '';
  showModal('deleteModal');
}

async function doDelete() {
  const password = document.getElementById('deletePwd').value;
  const alertEl = document.getElementById('deleteAlert');
  if (!password) return showAlert(alertEl, 'error', '请输入密码');

  const btn = document.getElementById('deleteConfirmBtn');
  btn.disabled = true;

  try {
    const r = await fetch('/api/items', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...pendingDelete, password })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.statusText);

    closeModal('deleteModal');
    await loadReports();
  } catch (e) {
    showAlert(alertEl, 'error', e.message);
    btn.disabled = false;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function showAlert(el, type, msg) {
  el.innerHTML = `<div class="alert alert-${type}">${esc(msg)}</div>`;
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.add('hidden');
  });
});

// Init
loadReports();
</script>
</body>
</html>
